# Prefix configuration
# Ctrl-a: Change prefix from Ctrl-b (screen-like)
# Ctrl-a twice: Send Ctrl-a to application
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload configuration
bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

# Terminal colors
set -g default-terminal "screen-256color"

# Focus events for vim/neovim FocusGained/FocusLost autocmds
set -g focus-events on

# Allow passthrough for Kitty graphics protocol (image.nvim, etc.)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Clipboard: pass OSC 52 through to the outer terminal, so copies made on
# this machine (including by nvim/tmux over SSH) land in the client clipboard
set -g set-clipboard on
set -ga terminal-features ",*:clipboard"

# Forward modified Enter/key combos (CSI u) so TUIs like pi see them
set -g extended-keys on
set -g extended-keys-format csi-u

# Pane splitting
# |: Split vertically (maintain current directory)
# _: Split horizontally (maintain current directory)
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Window/session management
# Convention: same letter = same verb; lowercase = window, uppercase = session.
# n: New window
# N: New session in current directory
# m: Move window to an index in this session (prompt: "move window to index:")
# M: Move window to another session       (prompt: "move window to session:")
# w: Session/window browser (clears nvim images first)
bind n new-window
bind N new-session -c "#{pane_current_path}"
bind-key m command-prompt -p "move window to index:" "swap-window -t '%%'"
bind-key M command-prompt -p "move window to session:" "move-window -t '%%'"
# Clear nvim mermaid images before session browser (redraws on user activity)
bind w run-shell 'zsh -ic "mermaid_clear"' \; choose-tree -Zw

# Window behavior
set-option -g allow-rename off

# Pane navigation with hjkl keys (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane movement (cross-window) — visual picker (choose-tree) with live preview
# =: Send current pane OUT to a window you pick
# +: Bring a pane IN from a window/pane you pick ("+" = add to this window)
# Picking a collapsed window brings only its active pane (not all panes);
# expand the window with L (or Right-arrow) first to pick a specific pane.
# (clears nvim mermaid images first, like the `w` browser)
bind-key = run-shell 'zsh -ic "mermaid_clear"' \; choose-tree -Zw "join-pane -t '%%'"
bind-key + run-shell 'zsh -ic "mermaid_clear"' \; choose-tree -Zw "join-pane -s '%%'"

# Clear history with ctrl-k
bind -n C-k send-keys -R \; clear-history

# Mouse support
set -g mouse on

# Scroll behavior
# WheelUp: Scroll up / enter copy mode
# WheelDown: Scroll down
# Ctrl+WheelUp: Half page up
# Ctrl+WheelDown: Half page down
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# Copy mode
# Enter copy mode: prefix + [
# Navigation: vim keys (hjkl)
# Selection: v (like vim visual mode)
# Copy to clipboard: Enter (via OSC 52, so it works locally and over SSH)
# Quick copy: Mouse drag
setw -g mode-keys vi
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Plugin management
# tpm: Plugin manager
# sensible: Sensible defaults
# resurrect: Session persistence
# continuum: Automatic session saving
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin initialization
# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'

